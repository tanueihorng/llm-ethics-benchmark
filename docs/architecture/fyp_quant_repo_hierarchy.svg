<text x="98" y="442" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#475569">How Codex/Claude know what to do</text>
<text x="98" y="477" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- AGENTS.md + CLAUDE.md</text>
<text x="98" y="499" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- docs/PROJECT_LOG.md</text>
<text x="98" y="521" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- docs/HANDOFF.md + dashboard</text>
<text x="98" y="543" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- .agents/skills/ + .codex/agents/ + hooks</text>
<text x="98" y="565" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- make agent-check + CI</text>
