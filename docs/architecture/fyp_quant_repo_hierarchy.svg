<text x="628" y="192" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#FFFFFF">fyp_quant/</text>
<text x="628" y="222" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#DDEBFF">Repo-native FYP research operating system</text>
<text x="628" y="257" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#EAF5FF">- Four major areas below</text>
