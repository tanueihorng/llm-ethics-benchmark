<text x="968" y="412" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#0F172A">Inputs + Execution</text>
<text x="968" y="442" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#475569">Config, data, SLURM, and commands</text>
<text x="968" y="477" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- configs/default.yaml + tc1.yaml</text>
<text x="968" y="499" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- data/xstest_v2_prompts.csv</text>
<text x="968" y="521" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- slurm/jobs_tc1* + judge sbatch</text>
<text x="968" y="543" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- scripts/prefetch_tc1.py</text>
<text x="968" y="565" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- fyp_cli.py + Makefile</text>
