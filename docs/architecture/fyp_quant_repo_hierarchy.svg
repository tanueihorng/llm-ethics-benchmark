<text x="1403" y="543" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- results/analysis/*</text>
<text x="1403" y="565" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- docs/FYP_Report_*.docx</text>
<text x="1403" y="587" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- docs/architecture/*</text>
