<text x="98" y="782" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#475569">Small context, reusable work packets</text>
<text x="98" y="817" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- docs/agent_tasks/</text>
<text x="98" y="839" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- .agents/skills/</text>
<text x="98" y="861" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- .codex/agents/</text>
<text x="98" y="883" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- .codex/hooks/</text>
<text x="98" y="905" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- .github/workflows/</text>
<rect x="511" y="718" width="390" height="250" rx="24" fill="#0F172A" opacity="0.09"/>
<path d="M 529 700 H 633 L 655 722 H 529 Z" fill="#28966F" opacity="0.18" stroke="#28966F" stroke-width="1.5"/>
<rect x="505" y="710" width="390" height="250" rx="24" fill="#FFFFFF" stroke="#28966F" stroke-width="2.2"/>
<text x="533" y="752" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#0F172A">Core Modules</text>
<text x="533" y="782" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#475569">Separation of concerns inside ethical_benchmark/</text>
<text x="533" y="817" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- benchmarks: HarmBench / XSTest / MMLU</text>
<text x="533" y="839" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- models: HF loading + generation</text>
<text x="533" y="861" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- pipeline: run + matrix orchestration</text>
<text x="533" y="883" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- analysis: deltas + labels</text>
<text x="533" y="905" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- judges: HarmBench classifier validation</text>
<text x="533" y="927" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- cluster: SLURM helpers</text>
<rect x="946" y="718" width="390" height="250" rx="24" fill="#0F172A" opacity="0.09"/>
<path d="M 964 700 H 1068 L 1090 722 H 964 Z" fill="#C2842E" opacity="0.18" stroke="#C2842E" stroke-width="1.5"/>
<rect x="940" y="710" width="390" height="250" rx="24" fill="#FFFFFF" stroke="#C2842E" stroke-width="2.2"/>
<text x="968" y="752" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#0F172A">Execution Files</text>
<text x="968" y="782" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#475569">Where runs are configured and launched</text>
<text x="968" y="817" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- configs/: model pairs + TC1 policy</text>
<text x="968" y="839" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- slurm/: tracked sbatch scripts</text>
<text x="968" y="861" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- scripts/: prefetch, judge, report,</text>
<text x="968" y="883" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">diagrams</text>
<text x="968" y="905" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- Makefile: short commands</text>
<text x="968" y="927" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- fyp_cli.py: unified CLI</text>
<rect x="1381" y="718" width="355" height="250" rx="24" fill="#0F172A" opacity="0.09"/>
<path d="M 1399 700 H 1503 L 1525 722 H 1399 Z" fill="#8D68C7" opacity="0.18" stroke="#8D68C7" stroke-width="1.5"/>
<rect x="1375" y="710" width="355" height="250" rx="24" fill="#FFFFFF" stroke="#8D68C7" stroke-width="2.2"/>
<text x="1403" y="752" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#0F172A">Artifact Contract</text>
<text x="1403" y="782" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#475569">The rule that protects scientific integrity</text>
<text x="1403" y="817" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- Raw TC1 outputs are immutable</text>
<text x="1403" y="839" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- Revisions use derived sidecars</text>
<text x="1403" y="861" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- Judge sidecars are redacted</text>
<text x="1403" y="883" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- PROJECT_LOG records decisions</text>
<text x="1403" y="905" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- Report is generated from source</text>
<rect x="70" y="1025" width="1660" height="150" rx="24" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="2"/>
<text x="102" y="1064" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0F172A">How to read this</text>
<text x="355" y="1052" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="500" fill="#334155">1. Start at fyp_quant/: the repo is both a research benchmark and an agent operating system.</text>
<text x="355" y="1080" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="500" fill="#334155">2. The middle row shows the four big jobs: agent control, research code, execution setup, and evidence/reporting.</text>
<text x="355" y="1108" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="500" fill="#334155">3. The lower row shows the concrete folders/files a new agent or human should inspect.</text>
<text x="355" y="1136" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="500" fill="#334155">4. The green links mean verification/control: checks connect the agent harness back to the evidence contract.</text>
