<text x="533" y="442" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#475569">The Python framework that runs the study</text>
<text x="533" y="477" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- ethical_benchmark/benchmarks</text>
<text x="533" y="499" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- ethical_benchmark/models</text>
<text x="533" y="521" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- ethical_benchmark/pipeline</text>
<text x="533" y="543" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- ethical_benchmark/analysis</text>
<text x="533" y="565" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- ethical_benchmark/judges</text>
<text x="533" y="587" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#334155">- ethical_benchmark/cluster</text>
