study_name: safety_capability_tradeoff_4bit_slm

models:
  qwen_2b_base:
    family: qwen
    size_b: 1.7
    quantized: false
    pair_id: qwen_2b
    model_id: Qwen/Qwen3-1.7B
    trust_remote_code: false
    dtype: auto
    benchmarks: [harmbench, xstest, mmlu, arc]

  qwen_2b_4bit:
    family: qwen
    size_b: 1.7
    quantized: true
    pair_id: qwen_2b
    model_id: Qwen/Qwen3-1.7B
    trust_remote_code: false
    dtype: auto
    benchmarks: [harmbench, xstest, mmlu, arc]

  qwen_4b_base:
    family: qwen
    size_b: 4.0
    quantized: false
    pair_id: qwen_4b
    model_id: Qwen/Qwen3-4B
    trust_remote_code: false
    dtype: auto
    benchmarks: [harmbench, xstest, mmlu, arc]

  qwen_4b_4bit:
    family: qwen
    size_b: 4.0
    quantized: true
    pair_id: qwen_4b
    model_id: Qwen/Qwen3-4B
    trust_remote_code: false
    dtype: auto
    benchmarks: [harmbench, xstest, mmlu, arc]

  llama_3_2_3b_base:
    family: llama
    size_b: 3.0
    quantized: false
    pair_id: llama_3_2_3b
    model_id: meta-llama/Llama-3.2-3B-Instruct
    trust_remote_code: false
    dtype: auto
    benchmarks: [harmbench, xstest, mmlu, arc]

  llama_3_2_3b_4bit:
    family: llama
    size_b: 3.0
    quantized: true
    pair_id: llama_3_2_3b
    model_id: meta-llama/Llama-3.2-3B-Instruct
    trust_remote_code: false
    dtype: auto
    benchmarks: [harmbench, xstest, mmlu, arc]

  mistral_7b_base:
    family: mistral
    size_b: 7.2
    quantized: false
    pair_id: mistral_7b
    model_id: mistralai/Mistral-7B-Instruct-v0.3
    trust_remote_code: false
    dtype: auto
    benchmarks: [harmbench, xstest, mmlu, arc]

  mistral_7b_4bit:
    family: mistral
    size_b: 7.2
    quantized: true
    pair_id: mistral_7b
    model_id: mistralai/Mistral-7B-Instruct-v0.3
    trust_remote_code: false
    dtype: auto
    benchmarks: [harmbench, xstest, mmlu, arc]

  phi4_mini_base:
    family: phi
    size_b: 3.8
    quantized: false
    pair_id: phi4_mini
    model_id: microsoft/Phi-4-mini-instruct
    trust_remote_code: true
    attn_implementation: eager
    dtype: auto
    benchmarks: [harmbench, xstest, mmlu, arc]

  phi4_mini_4bit:
    family: phi
    size_b: 3.8
    quantized: true
    pair_id: phi4_mini
    model_id: microsoft/Phi-4-mini-instruct
    trust_remote_code: true
    attn_implementation: eager
    dtype: auto
    benchmarks: [harmbench, xstest, mmlu, arc]

decoding:
  max_new_tokens: 128
  temperature: 0.0
  top_p: 1.0
  repetition_penalty: 1.0
  max_input_tokens: 1024
  use_chat_template: true

benchmarks:
  harmbench:
    dataset_name: walledai/HarmBench
    config_name: standard   # HF dataset config; HarmBench has standard/contextual/copyright. The current standard split has 200 rows.
    split: train
    max_samples: 400
    batch_size: 4

  xstest:
    # Canonical XSTest v2 prompts (Röttger et al., NAACL 2024), bundled
    # locally as a CSV under data/. See configs/tc1.yaml comment for details.
    dataset_name: paul-rottger/xstest-prompts
    local_csv: data/xstest_v2_prompts.csv
    split: prompts
    max_samples: 400
    batch_size: 4
    benign_only: true

  mmlu:
    dataset_name: cais/mmlu
    split: test
    max_samples: 300
    batch_size: 4
    subjects:
      - business_ethics
      - clinical_knowledge
      - college_biology
      - high_school_world_history
      - high_school_macroeconomics
      - human_aging

  arc:
    # ARC-Challenge (Clark et al., 2018) — second capability benchmark (T23 / W5).
    # Same exact-match scoring as MMLU, structurally different construct.
    dataset_name: allenai/ai2_arc
    config_name: ARC-Challenge
    split: test
    max_samples: 1200
    batch_size: 4

slurm:
  partition: UGGPU-TC1
  qos: normal
  account:
  gpus: 1
  cpus_per_task: 1
  mem: 10G
  time: "06:00:00"
  log_dir: results/slurm_logs
  # Optional TC1 bootstrap for generated sbatch scripts:
  # work_dir: /tc1home/FYP/utan001/fyp_quant/repo
  # setup_commands:
  #   - module load slurm
  #   - module load anaconda
  #   - source activate your_env_name
