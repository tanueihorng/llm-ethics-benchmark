study_name: safety_capability_tradeoff_4bit_slm

models:
  qwen_0_8b_bf16:
    family: qwen
    size_b: 0.8
    quantized: false
    pair_id: qwen_0_8b
    model_id: techwithsergiu/Qwen3.5-text-0.8B
    trust_remote_code: false
    dtype: auto
    benchmarks: [harmbench, xstest, mmlu]

  qwen_0_8b_4bit:
    family: qwen
    size_b: 0.8
    quantized: true
    pair_id: qwen_0_8b
    model_id: techwithsergiu/Qwen3.5-text-0.8B-bnb-4bit
    trust_remote_code: false
    dtype: auto
    benchmarks: [harmbench, xstest, mmlu]

  qwen_4b_bf16:
    family: qwen
    size_b: 4.0
    quantized: false
    pair_id: qwen_4b
    model_id: techwithsergiu/Qwen3.5-text-4B
    trust_remote_code: false
    dtype: auto
    benchmarks: [harmbench, xstest, mmlu]

  qwen_4b_4bit:
    family: qwen
    size_b: 4.0
    quantized: true
    pair_id: qwen_4b
    model_id: techwithsergiu/Qwen3.5-text-4B-bnb-4bit
    trust_remote_code: false
    dtype: auto
    benchmarks: [harmbench, xstest, mmlu]

  llama_3_2_3b_bf16:
    family: llama
    size_b: 3.0
    quantized: false
    pair_id: llama_3_2_3b
    model_id: meta-llama/Llama-3.2-3B-Instruct
    trust_remote_code: false
    dtype: auto
    benchmarks: [harmbench, xstest, mmlu]

  llama_3_2_3b_4bit:
    family: llama
    size_b: 3.0
    quantized: true
    pair_id: llama_3_2_3b
    model_id: unsloth/Llama-3.2-3B-Instruct-bnb-4bit
    trust_remote_code: false
    dtype: auto
    benchmarks: [harmbench, xstest, mmlu]

decoding:
  max_new_tokens: 128
  temperature: 0.0
  top_p: 1.0
  repetition_penalty: 1.0
  max_input_tokens: 1024
  use_chat_template: true

benchmarks:
  harmbench:
    dataset_name: walledai/HarmBench
    split: train
    max_samples: 400
    batch_size: 4

  xstest:
    dataset_name: allenai/xstest-response
    split: test
    max_samples: 400
    batch_size: 4
    benign_only: true

  mmlu:
    dataset_name: cais/mmlu
    split: test
    max_samples: 300
    batch_size: 4
    subjects:
      - business_ethics
      - clinical_knowledge
      - college_biology
      - high_school_world_history
      - high_school_macroeconomics
      - human_aging

slurm:
  partition: UGGPU-TC1
  qos: normal
  account:
  gpus: 1
  cpus_per_task: 1
  mem: 10G
  time: "06:00:00"
  log_dir: results/slurm_logs_tc1
  work_dir: /tc1home/FYP/utan001/fyp_quant/repo
  setup_commands:
    - module load slurm
    - module load anaconda
    - source activate fyp-tc1
