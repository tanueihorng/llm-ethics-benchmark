    trust_remote_code: false
    dtype: auto
    benchmarks: [harmbench, xstest, mmlu, arc]

  llama_3_2_3b_8bit:
    family: llama
    size_b: 3.0
    quantized: true
    quant_method: int8
    pair_id: llama_3_2_3b
