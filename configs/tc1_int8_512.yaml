# INT8 precision point (T29) — the third precision in the fp16 -> INT8 -> NF4 sweep.
#
# This is a SEPARATE config so the evaluated 10-model study (configs/tc1.yaml)
# and its base-vs-4bit pairwise pipeline stay byte-untouched. It defines the five
# `*_8bit` models (quantized via bitsandbytes LLM.int8 -- quant_method: int8) plus
# their fp16 baselines. The baselines are present only for schema pair-validity and
# as the sweep's fp16 reference; they are NOT re-run (the 512-token fp16 baselines
# already exist in results_512/<base>/ from the 512 main study, configs/tc1_512.yaml —
# NOT the 128-token results/<base>/ tree). Submit ONLY the `*_8bit` aliases on TC1, e.g.:
#   sbatch slurm/jobs_tc1_int8/qwen_2b_8bit__matrix.sbatch
# then score with the judge (slurm/judge_validation_int8.sbatch) and analyse the
# fp16/int8/nf4 trend with scripts/precision_sweep_analysis.py.
#
# INT8 (LLM.int8) keeps fp16 outlier columns and 8-bit-quantizes the rest -- a
# different method from NF4 (4-bit). Methodology is otherwise identical: greedy
# decoding, seed 42, the same four benchmarks, HarmBench classifier as primary ASR.
study_name: safety_capability_tradeoff_int8_sweep_512

models:
  qwen_2b_base:
    family: qwen
    size_b: 1.7
    quantized: false
    pair_id: qwen_2b
    model_id: Qwen/Qwen3-1.7B
    revision: 70d244cc86ccca08cf5af4e1e306ecf908b1ad5e  # T35: pinned to the same TC1-cached snapshot as configs/tc1_512.yaml (audit P1-3)
    trust_remote_code: false
    dtype: auto
    benchmarks: [harmbench, xstest, mmlu, arc]

  qwen_2b_8bit:
    family: qwen
    size_b: 1.7
    quantized: true
    quant_method: int8
    pair_id: qwen_2b
    model_id: Qwen/Qwen3-1.7B
    revision: 70d244cc86ccca08cf5af4e1e306ecf908b1ad5e  # T35: pinned to the same TC1-cached snapshot as configs/tc1_512.yaml (audit P1-3)
    trust_remote_code: false
    dtype: auto
    benchmarks: [harmbench, xstest, mmlu, arc]

  qwen_4b_base:
