    revision: cfbefacb99257ffa30c83adab238a50856ac3083  # T35: pinned to the same TC1-cached snapshot as configs/tc1_512.yaml (audit P1-3)
    trust_remote_code: false
    attn_implementation: eager
    dtype: auto
    benchmarks: [harmbench, xstest, mmlu, arc]

decoding:
  # T31/D39: 512-token budget for the generation-length rerun. Writes to a
  # parallel results_512/ root; the 128-token INT8 sweep (configs/tc1_int8.yaml)
  # in results/ is retained untouched.
  max_new_tokens: 512
  temperature: 0.0
  top_p: 1.0
  repetition_penalty: 1.0
  max_input_tokens: 1024
  use_chat_template: true

benchmarks:
  harmbench:
    dataset_name: walledai/HarmBench
    config_name: standard
    split: train
    max_samples: 400
    batch_size: 4

  xstest:
    dataset_name: paul-rottger/xstest-prompts
    local_csv: data/xstest_v2_prompts.csv
    split: prompts
    max_samples: 400
    batch_size: 4
    benign_only: true

  mmlu:
    dataset_name: cais/mmlu
    split: test
    max_samples: 300
    batch_size: 4
    subjects:
      - business_ethics
      - clinical_knowledge
      - college_biology
      - high_school_world_history
      - high_school_macroeconomics
      - human_aging

  arc:
    dataset_name: allenai/ai2_arc
    config_name: ARC-Challenge
    split: test
    max_samples: 1200
    batch_size: 4

slurm:
  partition: UGGPU-TC1
  qos: normal
  account:
  gpus: 1
  cpus_per_task: 1
  mem: 10G
  time: "06:00:00"
  log_dir: results_512/slurm_logs_tc1
  work_dir: /tc1home/FYP/utan001/fyp_quant/repo
  setup_commands:
    - module load slurm
    - module load anaconda
    - source activate fyp-tc1
    - export HF_HUB_OFFLINE=1
    - export HF_DATASETS_OFFLINE=1
    - export TRANSFORMERS_OFFLINE=1
