version: 1
description: >
  Machine-readable agent harness policy for fyp_quant. The policy encodes
  artifact immutability, stale-text scans, redaction scans, and report-worthy
  file patterns so agents can verify the repo instead of relying only on prose.

immutable_manifest: results/raw_artifact_manifest.sha256

immutable_artifacts:
  - results/*/*/raw.jsonl
  - results/*/*/summary.json
  # D41: the 512-token study is PRIMARY — its raw evidence gets the same
  # tamper-detection discipline as the 128 tree (plus the 512 multi-seed arm).
  - results_512/*/*/raw.jsonl
  - results_512/*/*/summary.json
  - results_sensitivity_512/*/*/*/raw.jsonl
  - results_sensitivity_512/*/*/*/summary.json

immutable_exclude:
  - results/analysis/*
  - results/summary/*
  - results_512/analysis/*
  - results_512/summary/*

allowed_derived_artifacts:
  - results/*/*/scores.v2.jsonl
  - results/*/*/summary.v2.json
  - results/*/harmbench/scores.judge.*.jsonl
  - results/*/harmbench/summary.judge.*.json
  - results/*/xstest/scores.judge.*.jsonl
  - results/*/xstest/summary.judge.*.json
  - results/analysis/*.json
  - results/analysis/*.csv
  - results_512/*/*/scores.v2.jsonl
  - results_512/*/*/summary.v2.json
  - results_512/*/harmbench/scores.judge.*.jsonl
  - results_512/*/harmbench/summary.judge.*.json
  - results_512/*/xstest/scores.judge.*.jsonl
  - results_512/*/xstest/summary.judge.*.json
  # T38 (D46): strict-parser capability sensitivity sidecars (MMLU + ARC).
  # Derived, redacted (IDs + parsed-index booleans + tier only, no text).
  - results_512/*/mmlu/scores.parser_strict.jsonl
  - results_512/*/mmlu/summary.parser_strict.json
  - results_512/*/arc/scores.parser_strict.jsonl
  - results_512/*/arc/summary.parser_strict.json
  - results_512/analysis/*.json
  - results_512/analysis/*.csv
  - results_sensitivity_512/*/*/harmbench/scores.judge.*.jsonl
  - results_sensitivity_512/*/*/harmbench/summary.judge.*.json

redaction:
  scan_paths:
    - docs/HANDOFF.md
    - docs/AGENT_DASHBOARD.md
    - docs/TC1_AGENT_CHECKLIST.md
    - docs/CODEX_MEETUP_BRIEF.md
    - docs/HARNESS_SELF_EVAL.md
    - docs/AGENTIC_WORKFLOW.md
    - docs/architecture/*.md
    - docs/architecture/*.svg
    - docs/architecture/*.drawio
    - docs/architecture/*.png
    - docs/agent_tasks/*.md
    - generated/claim_registry.json
    - .agents/skills/**/*.md
    - .claude/skills/**/*.md
    - .codex/agents/*.toml
    - .codex/hooks/*.py
    # Audit P3 (2026-07-02): the committed evidence sidecars and analysis
    # outputs were never redaction-scanned — a future judge run emitting a
    # raw-text field would have been committed unblocked. Now scanned;
    # self-tested in tests/test_agent_harness.py (synthetic leaked sidecar
    # fails the gate).
    - results/*/*/scores.v2.jsonl
    - results/*/*/summary.v2.json
    - results/*/harmbench/scores.judge.*.jsonl
    - results/*/harmbench/summary.judge.*.json
    - results/*/xstest/scores.judge.*.jsonl
    - results/*/xstest/summary.judge.*.json
    - results/analysis/*.json
    - results/analysis/*.csv
    - results_512/*/*/scores.v2.jsonl
    - results_512/*/*/summary.v2.json
    - results_512/*/harmbench/scores.judge.*.jsonl
    - results_512/*/harmbench/summary.judge.*.json
    - results_512/*/xstest/scores.judge.*.jsonl
    - results_512/*/xstest/summary.judge.*.json
    # T38 (D46): strict-parser sidecars must be redaction-scanned too (a future
    # sidecar emitting a raw-text field would otherwise commit unblocked).
    - results_512/*/mmlu/scores.parser_strict.jsonl
    - results_512/*/mmlu/summary.parser_strict.json
    - results_512/*/arc/scores.parser_strict.jsonl
    - results_512/*/arc/summary.parser_strict.json
    - results_512/analysis/*.json
    - results_512/analysis/*.csv
    # T41 (§8): the redacted per-item human-audit trail is JSONL under analysis/,
    # not matched by the *.json glob above — cover it explicitly so a future
    # per-item sidecar cannot commit a raw-text field unscanned.
    - results_512/analysis/*.jsonl
    - results_sensitivity_512/*/*/harmbench/scores.judge.*.jsonl
    - results_sensitivity_512/*/*/harmbench/summary.judge.*.json
  exclude:
    - docs/archive/*
  patterns:
    - 'SENSITIVE BEHAVIOR TEXT'
    - 'SENSITIVE MODEL RESPONSE'
    - '"prompt_text"\s*:'
    - '"response"\s*:'
    - '"generation"\s*:'
    - '"behavior"\s*:'

stale_text:
  scan_paths:
    - AGENTS.md
    - CLAUDE.md
    - README.md
    - docs/RESULTS_CARD.md
    - docs/HANDOFF.md
    - docs/AGENT_DASHBOARD.md
    - docs/TC1_AGENT_CHECKLIST.md
    - docs/CODEX_MEETUP_BRIEF.md
    - docs/AGENTIC_WORKFLOW.md
    - docs/architecture/*.md
    - docs/architecture/*.svg
    - docs/architecture/*.drawio
    - docs/agent_tasks/*.md
    - .agents/skills/**/*.md
    - .codex/agents/*.toml
    - .codex/hooks/*.py
    - scripts/*.py
    - ethical_benchmark/**/*.py
    - dashboard/*.py
    # D42 round-5/6: scan presentation HTML so future decks can't silently carry
    # retired results. Coverage contract: docs/*.html is scanned; the SIX pre-D41
    # decks excluded below are visibly banner-marked 128-era snapshots
    # (refresh-before-use). The two July status decks were refreshed to 512 on
    # 2026-07-02 and are scanned again; the as-sent June deck lives in
    # docs/archive/ (excluded wholesale, like all archives).
    - docs/*.html
    # Audit P1 root cause (2026-07-02): the stale 128-era κ values in report
    # §6.13 survived every gate because the canonical report SOURCE (.js) was
    # never in scan_paths — only .py/.md/.html were. The canonical builders are
    # now scanned; retired report v1–v4 and thesis v1–v3 builders are excluded
    # below as historical sources.
    - scripts/build_fyp_report_v5.js
    - scripts/build_fyp_thesis_v4.js
    # 2026-07-15 verification round: the CURRENT submission alternates and the
    # interim builder are deliverables too, but were scanned by nothing — a retired
    # κ claim ("conservative floor") survived in build_fyp_report_humanized.js
    # through a 77/77 green gate because only one verify-claims snippet check
    # covered them. Same rule as the canonical builders: current source is scanned,
    # retired source is excluded below.
    - scripts/build_fyp_report_humanized.js
    - scripts/build_fyp_thesis_humanized.js
    - scripts/build_fyp_interim.js
    - scripts/build_fyp_interim_humanized.js
  exclude:
    - docs/archive/*
    # fyp_showcase.html was refreshed to the 512-primary results on 2026-07-03
    # (banner removed) and is scanned again; v2 remains a banner-marked snapshot.
    - docs/fyp_showcase_v2.html
    - docs/fyp_architecture.html
    - docs/Codex_Meetup_Agent_Harness_Report.html
    - docs/agent_harness_showcase.html
    - docs/agentic_ai_report.html
    # Task packets are point-in-time records of completed tasks (like archive); they
    # legitimately cite the then-current report/builder, so they are not stale-scanned.
    - docs/agent_tasks/*
    # The claim CHECKER necessarily quotes the retired phrases it guards against
    # (e.g. `"immune to this asymmetry" not in c.text`) and the numbers it binds to
    # artifacts; it is verification tooling, not a deliverable, and its descriptions
    # are already artifact-bound, so it is not itself stale-text-scanned (T40/D47).
    - scripts/verify_report_claims.py
    # Retired report builders (v1–v4) and the 128-era thesis builders are
    # historical sources for archived/banner-marked docx — not scanned. Only
    # the CANONICAL builder (added to scan_paths above) is stale-scanned; when
    # a v6 builder is promoted, swap it into scan_paths and move v5 here.
    - scripts/build_fyp_report.js
    - scripts/build_fyp_report_v2.js
    - scripts/build_fyp_report_v3.js
    - scripts/build_fyp_report_v4.js
    - scripts/build_fyp_thesis.js
    - scripts/build_fyp_thesis_v2.js
    - scripts/build_fyp_thesis_v3.js
  patterns:
    - 'RESULTS PENDING'
    - 'pending judge'
    - 'v2 primary'
    - 'NEXT:\s*push'
    - 'push the latest'
    - 'judge validation still needs to run'
    # D40: the canonical report is docs/FYP_Report_2026-06-26_v3.docx (built by
    # scripts/build_fyp_report_v3.js). Guard against the retired predecessors being
    # cited as current in the instruction layer. The retired build_fyp_report.js still
    # EXISTS and is shown as a node in repo/architecture diagrams, so the builder guard
    # targets only instructional "edit/update/regenerate the old builder" phrasing,
    # NOT bare structural mentions.
    # (superseded-exempt since 2026-07-02: the canonical builder's Appendix
    # changelog legitimately names retired docx on lines that mark them
    # "(superseded ...)" — history stays legal, current-facing citation fails.)
    - '^(?!.*[Ss]uperseded).*FYP_Report_2026-06-14'
    - '(?:edit|edits|change|update|regenerate|generated from)[^\n]{0,40}build_fyp_report\.js'
    # D41: the canonical report is docs/FYP_Report_2026-07-01_v5.docx (built by
    # scripts/build_fyp_report_v5.js; 512-token primary). Guard against the retired
    # v3/v4 docx names or instructional edits to the retired v3 builder being cited
    # as current. Same two-tier approach as the D40 guard above: naked docx names
    # (they should only survive in docs/archive/, which is excluded) + verb-anchored
    # builder phrasing (the v3 builder file still exists as history).
    - '^(?!.*[Ss]uperseded).*FYP_Report_2026-06-26_v3'
    - '^(?!.*[Ss]uperseded).*FYP_Report_2026-06-30_v4'
    - '(?:edit|edits|change|update|regenerate|generated from)[^\n]{0,40}build_fyp_report_v3\.js'
    # D41 stale-RESULT guards: the 128-era headline may only be cited with explicit
    # 128-scoping on the same line. Pattern 1 catches a line asserting the +0.055
    # value without "128" on that line (CI bounds like "[−0.015, +0.055]" are
    # exempted via the ", "/"]" context). Pattern 2 catches the retired headline
    # phrasing ("only the smallest model ... significant") without 128-scoping.
    - '^(?!.*128).*(?<!, )\+0\.055(?!\])'
    - '^(?!.*128)(?=.*only the smallest model)(?=.*significant)'
    # D42 round-6: the retired headline also appears WITHOUT numbers ("the one
    # significant safety regression moved/relocated ..."), which the numeric
    # guards cannot catch. Negated forms ("no significant safety regression")
    # and 128-scoped lines stay legal.
    - '^(?!.*128).*(?<!no )(?<!no new )significant safety regression'
    # Audit P1 (2026-07-02): retired 128-era κ values may only appear on lines
    # scoped with "128" — the canonical report carried "κ = 0.19 at baseline,
    # 0.11 under 4-bit" and "κ 0.60–0.63" as 512-framed prose (true 512 values:
    # 0.28/0.25 judge-vs-proxy, 0.83/0.78 cross-judge). Self-tested to fire.
    - '^(?!.*128).*0\.19 at baseline'
    - '^(?!.*128).*κ as low as 0\.11'
    - '^(?!.*128).*0\.60–0\.63'
    # D43 thesis mirror (2026-07-02): the canonical thesis is
    # docs/FYP_Thesis_2026-07-02_v4.docx (build_fyp_thesis_v4.js, `make thesis`).
    # The retired 128-era thesis docx may only be named on lines scoped as
    # superseded / archived / 128-era history.
    - '^(?!.*(?:[Ss]uperseded|archive|128-era)).*FYP_Thesis_2026-06-'
    # D44 (2026-07-08 pre-submission audit): the Qwen3-1.7B XSTest over-refusal
    # decrease (−0.028) is BORDERLINE, not significant — its bootstrap CI excludes
    # zero but McNemar's exact test gives p = 0.065 on 11 discordant prompts, and
    # the report/thesis significance criterion is the exact test (report §3.7).
    # Guard the retired "two significant over-refusal deltas" framing, the old
    # Table 6.1 "yes" verdict for that row, and prose asserting the −0.028 delta
    # as significant on a line without borderline/not-significant/128 scoping.
    # Self-tested to fire (and caught one live residual on first run).
    - 'two significant over-refusal deltas'
    - '−0\.028 \[−0\.052, −0\.004\]", "yes"'
    - '^(?!.*(?:[Bb]orderline|not significant|128))(?=.*(?:over-refus|ΔOR|XSTest)).*−0\.028.{0,100}?(?<!in)significant'
    # P1 audit (2026-07-14, T40): ARC-Challenge is NOT immune to the 4-bit answer-
    # format asymmetry — its 4-bit lenient-fallback share (52.3%) exceeds MMLU's
    # (48.7%), the near-zero primary ARC delta is lenient-parser salvage, and under
    # a strict parser ARC falls −0.343 (§6.5, results_512/analysis/parser_strict_
    # sensitivity.json). The retired "immune / not subject to this format asymmetry"
    # framing is always wrong now and must not reappear in any scanned builder/doc.
    # The negative-lookbehind keeps the CORRECT negated form ("ARC is not immune to
    # this asymmetry") legal. Self-tested to fire (and exempt) in test_agent_harness.
    - '(?<!not )immune to this asymmetry'
    - 'not subject to this format asymmetry'
    # 2026-07-15 full-audit sweep: prevent the exact documentation/claim drifts
    # that escaped the prior report-only locks. Retired builders and historical
    # audit ledgers remain excluded above; current-facing surfaces must use the
    # real APIs, current alias composition, and artifact-derived values.
    - 'classify_refusal'
    - 'exposes seven subcommands'
    - 'ten NF4 aliases'
    - '29 judge-only'
    - '\[−0\.070, −0\.010\]'
    - '\[−0\.085, \+0\.040\]'
    - 'Qwen3-4B.*<span class="n">\.214</span>'
    - 'IEEE Access, 2025'
    # 2026-07-15 verification round: the patterns above were fitted to the exact
    # SENTENCE each fix rewrote, so an identically-wrong sibling site phrased
    # differently sailed through a green gate ('logs a warning if the flag is
    # false' was guarded; §3.3's 'logging a warning otherwise' was not). Guard the
    # PROPERTY — any prose pairing the quantization-engaged check with a warning
    # rather than the loader's actual fail-loud raise. loader.py contains no
    # LOGGER.warning call at all, so "the loader ... logs a warning" is never a true
    # description of it. Self-tested to fire on all three known wordings and to stay
    # silent on the corrected text.
    - '(?:is_loaded_in_4bit|the loader)[^\n]{0,80}?(?:logs|logging) a warning'
    # The κ human-validation sample deliberately over-weights disagreements, so the
    # design does NOT identify which way a representative population would move κ
    # (report §6.12). Any framing that asserts a DIRECTION for that unmeasured
    # quantity is the retired claim, whatever words it uses — "conservative floor",
    # "lower bound", "would sit higher", and the truncation caveat's "can only
    # inflate" are all the same over-claim and all survived a green gate in
    # different builders. Self-tested: fires on all five wordings, silent on the
    # canonical "the direction ... is not identified" / "plausibly inflates" form.
    - 'conservative floor|conservative lower bound|lower bound on[^\n]{0,25}agreement|would sit higher|can only inflate'
    # Retired hard-coded counts. Current-facing prose must name the live command,
    # not copy its present output. Anchored on the retired NUMBER in a count context
    # rather than on one phrasing — an earlier cut pinned "339 tests" and so missed
    # "All tests (339)", "339-test suite", and a `data-count="339"` counter. Lines
    # carrying a date are exempt so dated audit timelines keep their own era's
    # numbers; STARS excludes a deck's star-coordinate array that contains 339/329
    # as raw coordinates.
    - '^(?!.*20[0-9]{2}-[0-9]{2})(?=.*(?:test|suite|pytest|data-count))(?!.*STARS).*\b(?:339|329)\b'
    - '^(?!.*20[0-9]{2}-[0-9]{2})(?=.*(?:check|lock|verify-claims)).*\b(?:55|54)[- ]check'
    # Retired v1 over-refusal values. The showcase decks' ASR/MMLU/ARC/κ fields were
    # re-based to 512 while the over-refusal block kept v1 — including orSig:true for
    # qwen_2b, a significance the artifact denies (Δ−0.024, CI [−0.048, 0.000],
    # p=0.109). Phi's true FDR-surviving value is −0.048 (q=0.012), not −0.044
    # (q=0.049). Value-anchored, not syntax-anchored: the first cut guarded only the
    # JS literal `orDelta:-0.044` and so could not see the same false number in prose
    # one screen away. No pair carries robust_preservation at 512.
    # The retired judge-vs-proxy κ range for the hardest families (Qwen+Mistral).
    # D43 corrected 0.25–0.41 -> 0.25–0.59 and "added the range to the claim lock's
    # banned list" — but only in the en-dash spelling, so both July status decks kept
    # saying "0.25 to 0.41" in words, unguarded, on artifacts staged to send to the
    # supervisor. Value-anchored across spellings; artifact says min 0.2544 (mistral
    # 4-bit) to max 0.5895 (qwen_4b 4-bit).
    - '^(?!.*20[0-9]{2}-[0-9]{2}).*0\.25\s*(?:–|-|to)\s*0\.41'
    # The showcase decks' per-model κ field is the BASE judge-vs-proxy κ (its four
    # siblings are exactly 0.36/0.49/0.71/0.67). Mistral base is 0.2904 -> 0.29;
    # kappa:0.28 matches no alias in judge_agreement.json. Same class as the decks'
    # over-refusal block: a data record the prose-shaped guards cannot see.
    - 'kappa:0\.28'
    - 'or:\{base:0\.056'
    - '^(?!.*20[0-9]{2}-[0-9]{2})(?=.*(?:over-refus|ΔOR|orDelta|refusal|FDR|Phi)).*(?:[-−]0\.044|[-−]4\.4\s?pp)'
    - "label:'robust_preservation'"
    # T41 (2026-07-19 post-Phase-C audit). Four drifts the Phase-C sweeps left or
    # introduced; all corrected, guarded here, and self-tested in
    # tests/test_agent_harness.py. Dated revision rows (which record the corrections)
    # carry a YYYY-MM date and are exempt from all four.
    # (1) The multi-seed arm covers ALL FIVE pairs; the retired "three of the five
    #     pairs" was a live contradiction in report §6.6.1 / Chapter 7.
    - '^(?!.*20[0-9]{2}-[0-9]{2}).*three of the five pairs'
    # (2) Three pairs ARE sign-consistent (qwen_2b non-negative, qwen_4b all-positive,
    #     llama all-negative); the retired "no pair is sign-consistent" is false. The
    #     live claim is "no pair is robustly positive".
    - '^(?!.*20[0-9]{2}-[0-9]{2}).*no pair is sign-consistent'
    # (3) The LlamaGuard cross-check is revision-pinned + locally rerunnable, NOT
    #     "fully reproducible" (input digest / runtime / hardware are uncaptured).
    #     Bare "fully reproducible" stays legal for the regex scorer and the
    #     immutable-artifact contract; only the re-scoring overclaim is banned.
    - '^(?!.*20[0-9]{2}-[0-9]{2}).*fully reproducible re-scoring'
    # (4) The T36 gold-set result carries a disclosed protocol deviation (prereg §8);
    #     it is NOT a clean "pre-registered Outcome J". Lines that disclose the
    #     deviation, restate the retired wording, or say the badge is withdrawn are
    #     exempt (they carry the corrected framing, not the retired claim).
    - '^(?!.*20[0-9]{2}-[0-9]{2})(?!.*(?:disclosed|restated|deviation|withdrawn)).*pre-registered Outcome J'

report_worthy:
  changed_file_patterns:
    - configs/default.yaml
    - configs/tc1.yaml
    - ethical_benchmark/analysis/compare_quant_pairs.py
    - ethical_benchmark/benchmarks/*.py
    - ethical_benchmark/judges/*.py
    - ethical_benchmark/models/*.py
    - ethical_benchmark/pipeline/run_quant_benchmark.py
    - ethical_benchmark/pipeline/run_quant_matrix.py
    - scripts/build_fyp_report_v5.js
    - scripts/build_fyp_report_humanized.js
    - scripts/build_fyp_thesis_v4.js
    - scripts/build_fyp_thesis_humanized.js
    - scripts/build_fyp_interim.js
    - scripts/build_fyp_interim_humanized.js
    - scripts/claim_registry.py
    - scripts/sync_claim_surfaces.py
    - scripts/verify_claim_surfaces.py
    - scripts/lib/claim_registry.js
    - configs/claim_surfaces.yaml
    - generated/claim_registry.json
    - scripts/judge_agreement.py
    - scripts/run_judge_validation.py
    - scripts/rescore_harmbench.py
    - configs/tc1_512.yaml
    - results/analysis/*.json
    - results/analysis/*.csv
    - results_512/analysis/*.json
    - results_512/analysis/*.csv
  # Only a regenerated docx satisfies the freshness gate. build_fyp_report_v5.js is a
  # TRIGGER (above), not a satisfier: editing the report source must force `make report`,
  # so it deliberately does NOT appear here (otherwise a source-only edit would
  # self-satisfy the gate and the committed docx could go stale silently).
  required_changed_patterns:
    - docs/FYP_Report_*.docx

agent_status:
  # Informational only — no check consumes these (they document expected counts for
  # a human reading the policy). Kept current with the post-audit 2026-07-02 state:
  # 10 main-study fp16/NF4 harmbench_cls judge sidecars per tree (5 pairs x 2 members;
  # the 512-primary tree additionally carries 5 INT8 + 10 api_judge sidecars); 382 tests (incl. the D43 claim lock, tests/test_report_claims.py).
  expected_judge_sidecars: 10
  expected_test_count_note: 382
