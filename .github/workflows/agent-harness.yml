name: Agent Harness

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight harness dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyyaml

      - name: Run lightweight agent checks
        run: python scripts/agent_check.py --skip-pytest --skip-diff-check

      - name: Run harness eval suite
        run: python scripts/harness_eval.py

  # Full experiment unit/integration suite (audit P2-4). The lightweight `harness`
  # job above intentionally skips pytest for speed; this job installs the project's
  # declared dependencies and runs the whole test suite so CI actually exercises it.
  # The suite is CPU-only (no test imports torch/transformers at module load), so it
  # runs on a standard GitHub runner without a GPU.
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Run full pytest suite
        run: pytest tests/ -q
